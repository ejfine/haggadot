minimum_pre_commit_version: 4.2.0
# run `pre-commit autoupdate --freeze` to update all hooks
default_install_hook_types: [pre-commit, post-checkout]
repos:
  # Git-related
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 38980559e3a605691d6579f96222c30778e5a69e # frozen: 3.0.0
    hooks:
      - id: git-dirty

  # Reformatting (should generally come before any file format or other checks, because reformatting can change things)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)^(
              .*/vendor_files/.*|
              .*tests/.*/__snapshots__/.*|
              .*/generated/open[-_]api/.*|
          )$
      - id: end-of-file-fixer
        # the XML formatter hook doesn't leave a blank line at the end, so excluding XML files from this hook to avoid conflicts
        # the extra trailing newline in the pull request template makes it easier to click there in the github console. The CLI that programmatically generates devcontainer-lock.json always ends the file incompatible with this hook.
        exclude: |
          (?x)^(
              .github/pull_request_template.md|
              template/.github/pull_request_template.md|
              template/.copier-answers.yml.jinja-base|
              template/template/.copier-answers.yml.jinja|
              template/.copier-answers.yml.jinja|
              .*generated/graphql.ts|
              .*/generated/open[-_]api/.*|
              .*tests/.*/__snapshots__/.*|
              .devcontainer/devcontainer-lock.json|
              .copier-answers.yml|
              .*\.xml|
              .*\.svg|
              .*/vendor_files/.*|
          )$
      - id: pretty-format-json
        exclude: |
          (?x)^(
              .devcontainer/devcontainer.json|
              .devcontainer/devcontainer-lock.json|
              .*devcontainer.json|
              .*pyrightconfig.json|
              .*tsconfig.json|
              .*biome.jsonc|
              .*/generated/open[-_]api/.*|
              .*tests/.*/__snapshots__/.*|
              .*/vendor_files/.*|
          )$
        args: [--autofix, --no-sort-keys]

  - repo: https://github.com/pamoller/xmlformatter
    rev: 47ae0fb9cf2a515f8a2666050fac66fd719ae530 # frozen: v0.2.8
    hooks:
      - id: xml-formatter
        exclude: |
          (?x)^(
              .*/__snapshots__/.*|
              .*/vendor_files/.*|
              .*\.svg|
          )$

  # Invalid File Checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=123"]
        exclude: (uv.lock)|(pnpm-lock.yaml)|(frontend/public/favicon.ico)|(backend/src/static/favicon.ico)|(static.*graphiql.*react-dom.production.min.js)
      - id: check-json
        # exclude JSON5 or JSONC files with comments
        exclude: |
          (?x)^(
              .devcontainer/devcontainer.json|
              .devcontainer/devcontainer-lock.json|
              .*devcontainer.json|
              .*pyrightconfig.json|
              .*tsconfig.json|
          )$
      - id: check-yaml
        # .copier-answers.yml is an autogenerated YAML file by Copier that throws 'found unhashable key' errors
        # Helm charts contain other non-YAML markers that cause errors here. they should be checked with helm-lint instead
        # VCRpy cassettes sometimes contain non-YAML markers that cause errors---but they're autogenerated anyway
        exclude: |
          (?x)^(
              .copier-answers.yml|
              (.*/?helm/.*)|
              (.*/tests/unit/.*/?cassettes/.*)|
          )$
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: ec368acd16deee9c560c105ab6d27db4ee19a5ec  # frozen: 0.36.2
    hooks:
      - id: check-github-workflows

  - repo: https://github.com/maresb/check-json5
    rev: bd4737432a2175617a9eeaa510ab369cbc1cbd3d  # frozen: v1.0.1
    hooks:
      - id: check-json5
        files: |
          (?x)^(
              .devcontainer/devcontainer.json|
              .devcontainer/devcontainer-lock.json|
              .*devcontainer.json|
              .*pyrightconfig.json|
              .*tsconfig.json|
          )$

  - repo: local
    hooks:
      - id: forbidden-files
        name: forbidden files
        entry: found copier update rejection files; review them and remove them
        language: fail
        files: "\\.rej$"

  # Safety/Security Issues
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: detect-private-key

#  - repo: https://github.com/woodruffw/zizmor-pre-commit
#    rev: b933184438555436e38621f46ceb0c417cbed400  # frozen: v1.13.0
#    hooks:
#      - id: zizmor

  # Linting






  - repo: https://github.com/hadolint/hadolint
    rev: 4e697ba704fd23b2409b947a319c19c3ee54d24f  # frozen: v2.14.0
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        exclude: .*\.jinja$
        description: Runs hadolint to lint Dockerfiles


  # Updating repo config/tooling files
  - repo: local
    hooks:
      - id: merge-claude-settings
        # Keep Claude's settings.json synced with the JSON5 files. It's only for local development, so don't run it in CI
        name: merge Claude settings
        entry: bash -c '[[ "${GITHUB_ACTIONS:-}" == "true" || "${CI:-}" == "true" ]] && exit 0; bash .claude/helpers/merge-claude-settings.sh'
        files: .claude/settings/.*\.(json|jsonc)$
        pass_filenames: false
        language: system
