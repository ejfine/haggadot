name: Build

on:
  workflow_call:
    inputs:
      version:
        description: "Version string to embed in the PDF (e.g. v1.0)"
        required: false
        type: string

jobs:
  compile-haggadah:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        wine_theme:
          - abundance
          - gratitude
          - four-freedoms
          - effective-altruism
          - what-does-freedom-mean-to-you
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set wine theme
        run: sed -i 's|\\input{wine-themes/.*}|\\input{wine-themes/${{ matrix.wine_theme }}}|' main.tex
      - name: Set version
        if: inputs.version != ''
        run: sed -i 's|\\newcommand{\\haggadahVersion}{[^}]*}|\\newcommand{\\haggadahVersion}{${{ inputs.version }}}|' main.tex
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@4.0.0
        with:
          root_file: |
            main.tex
          work_in_root_file_dir: true
          docker_image: texlive/texlive@sha256:62927d994f09aea455c8ea9da034af14764f9e2276a616b413545e7cec69c06b
      - name: Rename PDF
        run: mv main.pdf haggadah-${{ matrix.wine_theme }}.pdf
      - name: Upload PDF file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: haggadah-${{ matrix.wine_theme }}
          path: haggadah-${{ matrix.wine_theme }}.pdf

  compile-halail:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set version
        if: inputs.version != ''
        run: sed -i 's|\\newcommand{\\haggadahVersion}{[^}]*}|\\newcommand{\\haggadahVersion}{${{ inputs.version }}}|' halail/main.tex
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@4.0.0
        with:
          root_file: |
            halail/main.tex
          work_in_root_file_dir: true
          docker_image: texlive/texlive@sha256:62927d994f09aea455c8ea9da034af14764f9e2276a616b413545e7cec69c06b
      - name: Rename PDF
        run: mv halail/main.pdf halail.pdf
      - name: Upload PDF file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: halail
          path: halail.pdf
