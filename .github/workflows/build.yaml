name: Build

on:
  workflow_call:

jobs:
  compile-haggadah:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        wine_theme:
          - abundance
          - gratitude
          - four-freedoms
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set wine theme
        run: sed -i 's|\\input{wine-themes/.*}|\\input{wine-themes/${{ matrix.wine_theme }}}|' main.tex
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@4.0.0
        with:
          root_file: |
            main.tex
          work_in_root_file_dir: true
          docker_image: texlive/texlive@sha256:62927d994f09aea455c8ea9da034af14764f9e2276a616b413545e7cec69c06b
      - name: Rename PDF
        run: mv main.pdf haggadah-${{ matrix.wine_theme }}.pdf
      - name: Upload PDF file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: haggadah-${{ matrix.wine_theme }}
          path: haggadah-${{ matrix.wine_theme }}.pdf

  compile-hallel:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@4.0.0
        with:
          root_file: |
            hallel/main.tex
          work_in_root_file_dir: true
          docker_image: texlive/texlive@sha256:62927d994f09aea455c8ea9da034af14764f9e2276a616b413545e7cec69c06b
      - name: Rename PDF
        run: mv hallel/main.pdf hallel.pdf
      - name: Upload PDF file
        uses: actions/upload-artifact@v7.0.0
        with:
          name: hallel
          path: hallel.pdf
