name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 2026, 2026-passover)"
        required: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: pdfs
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Haggadah ${{ inputs.tag }}
          files: pdfs/*.pdf
          generate_release_notes: true
